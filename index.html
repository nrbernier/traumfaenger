  if (BEATS[att] === def) return 1.5;
  if (BEATS[def] === att) return 0.67;

}

function genMap(){

  rect(0,0,MW,1,'t'); rect(0,MH-1,MW,1,'t'); rect(0,0,1,MH,'t'); rect(MW-1,0,1,MH,'t');
  // Unconscious Depths (north)
  rect(1,1,34,7,'D');
  rect(4,2,6,3,'M'); rect(25,2,7,3,'M'); rect(10,5,5,2,'M'); rect(21,5,6,2,'M');
  map[2][17] = 'a';
  // fence with gate
  rect(1,8,34,1,'f'); map[8][17] = 'G';
  // paths
  rect(17,9,1,17,'.');
  rect(3,16,31,1,'.');
  rect(10,20,16,5,'.');           // town plaza
  // clinic (Berggasse) + house
  rect(12,17,6,3,'b'); map[19][14] = 'd';
  rect(21,17,5,3,'b');
  // pond
  rect(27,21,5,3,'w');
  // dream mists (encounter zones)
  rect(3,11,5,4,'m'); rect(2,19,5,4,'m');
  rect(28,11,6,4,'m'); rect(29,18,5,2,'m');
  // scattered trees
  [[6,9],[10,12],[24,11],[26,13],[8,18],[27,17],[5,24],[31,24],[12,10],[22,9]]
    .forEach(([x,y]) => { if(map[y][x]==='g') map[y][x]='t'; });
}

const SOLID = { t:1, w:1, b:1, f:1 };
function isWalkable(x,y){
  if (x<0||y<0||x>=MW||y>=MH) return false;
  const c = map[y][x];
  if (SOLID[c]) return false;
  if (c==='G' && !flags.gateOpen) return false;
  if (NPCS.some(n => n.x===x && n.y===y)) return false;
  return true;
}

/* ---------------- Dream creatures ---------------- */
function calcStats(sp, lvl){
  const b = SPECIES[sp].base;
  return {
    maxhp: Math.floor(2*b.hp*lvl/100) + lvl + 10,
    atk:   Math.floor(2*b.atk*lvl/100) + 5,
    def:   Math.floor(2*b.def*lvl/100) + 5,
    spd:   Math.floor(2*b.spd*lvl/100) + 5,
  };
}
function movesAtLevel(sp, lvl){
  return SPECIES[sp].moves.filter(([l]) => l<=lvl).map(([,m]) => m).slice(-4);
}
function makeMon(sp, lvl){
  const stats = calcStats(sp, lvl);
  return { sp, lvl, xp:0, hp:stats.maxhp, stats, moves:movesAtLevel(sp,lvl) };
}
const monName = m => SPECIES[m.sp].name;
const xpNeeded = lvl => lvl*40;

function gainXp(mon, amount, msgs){
  msgs.push(`${monName(mon)} gains ${amount} insight.`);
  mon.xp += amount;
  while (mon.xp >= xpNeeded(mon.lvl) && mon.lvl < 30){
    mon.xp -= xpNeeded(mon.lvl);
    mon.lvl++;
    const old = mon.stats;
    mon.stats = calcStats(mon.sp, mon.lvl);
    mon.hp = Math.min(mon.stats.maxhp, mon.hp + (mon.stats.maxhp - old.maxhp));
    msgs.push(`${monName(mon)} grew to level ${mon.lvl}!`);
    for (const [l, mv] of SPECIES[mon.sp].moves){
      if (l === mon.lvl && !mon.moves.includes(mv)){
        if (mon.moves.length >= 4){
          msgs.push(`${monName(mon)} forgot ${mon.moves[0]}...`);
          mon.moves.shift();
        }
        mon.moves.push(mv);
        msgs.push(`${monName(mon)} learned ${mv}!`);
      }
    }
  }
}

/* ---------------- Dialog ---------------- */
function showDialog(lines, cb){
  dialog = { lines: lines.slice(), idx:0, cb: cb || null };
  state = 'dialog';
}
function advanceDialog(){
  dialog.idx++;
  if (dialog.idx >= dialog.lines.length){
    const cb = dialog.cb;
    dialog = null;
    state = 'world';
    if (cb) cb();
  }
}

/* ---------------- Battle ---------------- */
function firstHealthy(){ return party.findIndex(m => m.hp > 0); }

function startBattle(opts){
  battle = {
    wild: opts.wild, enemyParty: opts.enemyParty, enemyIdx: 0,
    trainerName: opts.trainerName || null,
    onWin: opts.onWin || null,
    activeIdx: firstHealthy(),
    phase:'msg', msgs:[], msgCb:null,
    menuIdx:0, moveIdx:0, partyIdx:0, itemIdx:0, forced:false,
  };
  state = 'battle';
  const intro = opts.wild
    ? [`A wild ${monName(eMon())} drifts close!`]
    : [`${opts.trainerName}'s nightmare takes shape — ${monName(eMon())}!`];
  bmsg([...intro, `Go, ${monName(pMon())}!`], () => { battle.phase = 'menu'; });
}
const pMon = () => party[battle.activeIdx];
const eMon = () => battle.enemyParty[battle.enemyIdx];

function bmsg(lines, cb){
  battle.msgs = lines.slice();
  battle.msgCb = cb || null;
  battle.phase = 'msg';
}
function advanceBmsg(){
  battle.msgs.shift();
  if (battle.msgs.length === 0){
    const cb = battle.msgCb;
    battle.msgCb = null;
    if (cb) cb(); else battle.phase = 'menu';
  }
}

function calcDamage(atk, def, mvName){
  const mv = MOVES[mvName];
  const eff = effMult(mv.type, SPECIES[def.sp].type);
  const crit = Math.random() < 1/16 ? 1.5 : 1;
  const base = ((2*atk.lvl/5 + 2) * mv.power * atk.stats.atk / Math.max(1, def.stats.def)) / 50 + 2;
  const dmg = Math.max(1, Math.floor(base * eff * crit * (0.85 + Math.random()*0.15)));
  return { dmg, eff, crit: crit > 1 };
}

function attack(attacker, defender, mvName, who, after){
  const owner = who === 'p' ? 'Your' : (battle.wild ? 'Wild' : 'Enemy');
  const lines = [`${owner} ${monName(attacker)} used ${mvName}!`];
  if (Math.random()*100 > MOVES[mvName].acc){
    lines.push('...but it slipped through the dream like smoke!');
    bmsg(lines, after);
    return;
  }
  const r = calcDamage(attacker, defender, mvName);
  defender.hp = Math.max(0, defender.hp - r.dmg);
  if (r.crit) lines.push('A piercing insight!');
  if (r.eff > 1) lines.push("It strikes the dream's weak point!");
  if (r.eff < 1) lines.push('The dream barely notices...');
  bmsg(lines, after);
}

function enemyMove(){
  const ms = eMon().moves;
  return ms[Math.floor(Math.random()*ms.length)];
}

function doRound(playerMoveName){
  const p = pMon(), e = eMon();
  const acts = p.stats.spd >= e.stats.spd
    ? [['p', playerMoveName], ['e', enemyMove()]]
    : [['e', enemyMove()], ['p', playerMoveName]];
  runActs(acts, 0);
}
function enemyOnlyTurn(){ runActs([['e', enemyMove()]], 0); }

function runActs(acts, i){
  if (i >= acts.length){ battle.phase = 'menu'; return; }
  const [who, mv] = acts[i];
  const atk = who === 'p' ? pMon() : eMon();
  const def = who === 'p' ? eMon() : pMon();
  if (atk.hp <= 0){ runActs(acts, i+1); return; }
  attack(atk, def, mv, who, () => {
    if (def.hp <= 0) handleFaint(who === 'p' ? 'e' : 'p');
    else runActs(acts, i+1);
  });
}

function handleFaint(side){
  if (side === 'e'){
    const e = eMon();
    const msgs = [`${battle.wild ? 'Wild' : 'Enemy'} ${monName(e)} dissolves into mist!`];
    gainXp(pMon(), e.lvl * 22 * (battle.wild ? 1 : 2), msgs);
    bmsg(msgs, () => {
      battle.enemyIdx++;
      if (!battle.wild && battle.enemyIdx < battle.enemyParty.length){
        bmsg([`${battle.trainerName}'s next nightmare stirs — ${monName(eMon())}!`],
             () => { battle.phase = 'menu'; });
      } else {
        endBattle(true);
      }
    });
  } else {
    const msgs = [`Your ${monName(pMon())} is overwhelmed by the dream!`];
    if (party.some(m => m.hp > 0)){
      bmsg(msgs, () => { battle.forced = true; battle.partyIdx = firstHealthy(); battle.phase = 'party'; });
    } else {
      bmsg([...msgs, 'All your dreams have faded...'], () => blackout());
    }
  }
}

function endBattle(won){
  const onWin = battle.onWin;
  battle = null;
  state = 'world';
  if (won && onWin) onWin();
}

function blackout(){
  battle = null;
  party.forEach(m => { m.hp = m.stats.maxhp; });
  player.x = 14; player.y = 20; player.dir = 'up';
  state = 'world';
  showDialog(['You drift back to the clinic on Berggasse...',
              "Martha: Rest, Sigi. Your dreams are safe with me."]);
}

function tryCapture(itemKey){
  if (!battle.wild){
    bmsg(["A patient's nightmare cannot be captured — it must be confronted!"],
         () => { battle.phase = 'menu'; });
    return;
  }
  if (items[itemKey] <= 0){
    bmsg([`You have no ${ITEM_DEFS[itemKey].label} left!`], () => { battle.phase = 'items'; });
    return;
  }
  items[itemKey]--;
  const e = eMon();
  let chance = 0.2 + (1 - e.hp / e.stats.maxhp) * 0.65;
  if (itemKey === 'leather') chance = Math.min(0.97, chance * 1.45);
  if (Math.random() < chance){
    journalTotal++;
    const caught = makeMon(e.sp, e.lvl);
    caught.hp = e.hp;
    const lines = ['You write feverishly, ink racing the dawn...',
                   `The dream of ${monName(e)} is bound to your journal!`];
    if (party.length < 6){ party.push(caught); }
    else lines.push('Your satchel is full — it is filed in your archive at the clinic.');
    bmsg(lines, () => endBattle(false));
  } else {
    bmsg(['You sketch quickly, but the dream wriggles free of the page!'],
         () => enemyOnlyTurn());
  }
}

function useCoffee(){
  if (items.coffee <= 0){
    bmsg(['No coffee left! Vienna weeps.'], () => { battle.phase = 'items'; });
    return;
  }
  items.coffee--;
  const p = pMon();
  p.hp = Math.min(p.stats.maxhp, p.hp + 40);
  bmsg([`${monName(p)} perks up! It recovered some HP.`], () => enemyOnlyTurn());
}

function tryFlee(){
  if (!battle.wild){
    bmsg(['You cannot abandon a patient mid-session!'], () => { battle.phase = 'menu'; });
    return;
  }
  const chance = Math.max(0.3, 0.55 + (pMon().stats.spd - eMon().stats.spd) * 0.04);
  if (Math.random() < chance){
    bmsg(['You close your eyes and let the dream pass over you...'], () => endBattle(false));
  } else {
    bmsg(['The dream blocks your waking!'], () => enemyOnlyTurn());
  }
}

function switchTo(idx){
  const wasForced = battle.forced;
  battle.forced = false;
  battle.activeIdx = idx;
  bmsg([`Go, ${monName(pMon())}!`], () => {
    if (wasForced) battle.phase = 'menu';
    else enemyOnlyTurn();
  });
}

  const sp = z.pool[Math.floor(Math.random()*z.pool.length)];
  const lvl = z.lv[0] + Math.floor(Math.random()*(z.lv[1]-z.lv[0]+1));
  startBattle({ wild:true, enemyParty:[makeMon(sp,lvl)] });
}

    wild:false,
    trainerName: npc.name,
    enemyParty: npc.party.map(([sp,lv]) => makeMon(sp,lv)),
    onWin: () => {
      flags[npc.flag] = true;
      for (const k in npc.reward) items[k] = (items[k]||0) + npc.reward[k];
      showDialog(npc.outro);
    },
  });
}

    wild:false,
    trainerName:'The Depths',
    enemyParty:[makeMon('unbewusste',14)],
    onWin: () => { flags.boss = true; state = 'ending'; },

function talkTo(npc){
  if (npc.kind === 'flavor'){ showDialog(npc.lines); return; }
  if (npc.kind === 'mentor'){
    if (party.length === 0){
      showDialog(["Brücke: Ah, young Freud! Vienna's sleep grows troubled — wild dreams roam the parks and nightmares grip my patients.",
                  'Brücke: I have studied three dreams long enough to tame them. One shall be your first companion.',
                  'Brücke: Choose wisely — then conquer dreams, fill your journal, and help the people of this city.'],
                 () => { state = 'starter'; starterIdx = 0; });
    } else if (helpedCount() < 3){
      showDialog(['Brücke: Three patients need you: Bertha by my clinic, Herr Lanzer in the eastern woods, Frau Cäcilie in the west park.',
                  'Brücke: Help all three, and the gatekeeper may let you descend to the source of it all.',
                  'Brücke: Step into the violet mists to find wild dreams. My clinic door heals your companions and restocks your satchel.']);
    } else if (!flags.boss){
      showDialog(['Brücke: All three sleep soundly. Whatever stirs beneath the north gate — it is yours to face now, Herr Doktor.']);
    } else {
      showDialog(['Brücke: They will write your name beside Copernicus and Darwin. Third blow to human vanity, and the kindest one.']);
    }
    return;
  }
  if (npc.kind === 'guard'){
    if (flags.gateOpen){ showDialog(['Gatekeeper: Mind the dark down there. It minds you back.']); return; }
    if (helpedCount() < 3){
      showDialog([`Gatekeeper: Beyond this gate lie the Unconscious Depths. None may pass unprepared.`,
                  `Gatekeeper: Prove your insight — ease the suffering of Vienna's three troubled patients. (${helpedCount()}/3 helped)`]);
    } else {
      showDialog(['Gatekeeper: Bertha... Lanzer... Cäcilie... all dreaming peacefully. Remarkable.',
                  'Gatekeeper: Very well. The Depths will see you now.'],
                 () => {
                   flags.gateOpen = true;
                   map[8][17] = '.';
                   npc.x = 15; npc.y = 9;
                 });
    }
    return;
  }
  if (npc.kind === 'patient'){
    if (flags[npc.flag]){ showDialog([npc.thanks]); return; }
    if (party.length === 0){ showDialog([`${npc.name}: You look as lost as I feel. Speak to Professor Brücke first, young man.`]); return; }
    showDialog(npc.intro, () => startPatientBattle(npc));
  }
}

function interact(){
  const [dx,dy] = DIRS[player.dir];
  const tx = player.x + dx, ty = player.y + dy;
  const npc = NPCS.find(n => n.x===tx && n.y===ty);
  if (npc) talkTo(npc);
}

function stepEvent(){
  const c = map[player.y][player.x];
  if (c === 'd'){
    const needHeal = party.some(m => m.hp < m.stats.maxhp);
    const needStock = items.notebook < 8 || items.coffee < 3;
    if (needHeal || needStock){
      party.forEach(m => { m.hp = m.stats.maxhp; });
      items.notebook = Math.max(items.notebook, 8);
      items.coffee = Math.max(items.coffee, 3);
      showDialog(['Martha tends to your dreams and refills your satchel.',
                  'Martha: Notebooks topped up, coffee strong enough to wake the dead. Off you go.']);
    }
    return;
  }
  if (c === 'a'){
    if (flags.boss){ showDialog(['The altar is cold. The Depths are quiet now — merely deep.']); return; }
    if (party.length === 0) return;
    showDialog(['The mist parts. Something vast turns over in its sleep, far below...',
                'A voice without a mouth: "YOU HAVE READ MY SMALLER PAGES. NOW READ ME."',
                'DAS UNBEWUSSTE rises!'],
               () => startFinalBattle());
    return;
  }
  if ((c === 'm' || c === 'M') && party.length > 0){
    const rate = c === 'm' ? 0.13 : 0.17;
    if (Math.random() < rate) startWildBattle(c);
  }
}

/* ---------------- Input ---------------- */
const DIRS = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
const KEY_DIR = { arrowup:'up', arrowdown:'down', arrowleft:'left', arrowright:'right', w:'up', s:'down', a:'left', d:'right' };

function tryMove(dir){
  player.dir = dir;
  const [dx,dy] = DIRS[dir];
  const nx = player.x + dx, ny = player.y + dy;
  if (isWalkable(nx,ny)){
    player.x = nx; player.y = ny;
    stepEvent();
  }
}

function handleKey(k){
  const confirm = (k === 'z' || k === 'enter');
  const back = k === 'x';

  if (state === 'title'){ if (confirm) newGame(); return; }

  if (state === 'ending'){ if (confirm) state = 'world'; return; }

  if (state === 'starter'){
    if (k === 'arrowleft' || k === 'a') starterIdx = (starterIdx+2)%3;
    if (k === 'arrowright' || k === 'd') starterIdx = (starterIdx+1)%3;
    if (confirm){
      const sp = STARTERS[starterIdx];
      party.push(makeMon(sp, 5));
      journalTotal++;
      state = 'world';
      showDialog([`Brücke: ${SPECIES[sp].name}! ${SPECIES[sp].desc}`,
                  'Brücke: It will fight beside you. Wild dreams weaken when battled — sketch them in a Notebook to capture them.',
                  'Brücke: Now go. Vienna talks in its sleep, and somebody ought to listen.']);
    }
    return;
  }

  if (state === 'dialog'){ if (confirm) advanceDialog(); return; }

  if (state === 'menu'){ if (confirm || back) state = 'world'; return; }

  if (state === 'world'){
    if (confirm) interact();
    if (back) state = 'menu';
    return;
  }

  if (state === 'battle'){
    const b = battle;
    if (b.phase === 'msg'){ if (confirm) advanceBmsg(); return; }

    if (b.phase === 'menu'){
      if (k==='arrowleft'||k==='a')  b.menuIdx = b.menuIdx % 2 === 1 ? b.menuIdx-1 : b.menuIdx+1;
      if (k==='arrowright'||k==='d') b.menuIdx = b.menuIdx % 2 === 0 ? b.menuIdx+1 : b.menuIdx-1;
      if (k==='arrowup'||k==='w')    b.menuIdx = (b.menuIdx+2)%4;
      if (k==='arrowdown'||k==='s')  b.menuIdx = (b.menuIdx+2)%4;
      if (confirm){
        if (b.menuIdx===0){ b.moveIdx = 0; b.phase = 'moves'; }
        if (b.menuIdx===1){ b.itemIdx = 0; b.phase = 'items'; }
        if (b.menuIdx===2){ b.partyIdx = 0; b.phase = 'party'; }
        if (b.menuIdx===3) tryFlee();
      }
      return;
    }

    if (b.phase === 'moves'){
      const n = pMon().moves.length;
      if (k==='arrowleft'||k==='a')  b.moveIdx = Math.max(0, b.moveIdx-1);
      if (k==='arrowright'||k==='d') b.moveIdx = Math.min(n-1, b.moveIdx+1);
      if (k==='arrowup'||k==='w')    b.moveIdx = Math.max(0, b.moveIdx-2);
      if (k==='arrowdown'||k==='s')  b.moveIdx = Math.min(n-1, b.moveIdx+2);
      if (back){ b.phase = 'menu'; return; }
      if (confirm) doRound(pMon().moves[b.moveIdx]);
      return;
    }

    if (b.phase === 'items'){
      const keys = Object.keys(ITEM_DEFS);
      if (k==='arrowup'||k==='w')   b.itemIdx = Math.max(0, b.itemIdx-1);
      if (k==='arrowdown'||k==='s') b.itemIdx = Math.min(keys.length-1, b.itemIdx+1);
      if (back){ b.phase = 'menu'; return; }
      if (confirm){
        const key = keys[b.itemIdx];
        if (key === 'coffee') useCoffee();
        else tryCapture(key);
      }
      return;
    }

    if (b.phase === 'party'){
      if (k==='arrowup'||k==='w')   b.partyIdx = Math.max(0, b.partyIdx-1);
      if (k==='arrowdown'||k==='s') b.partyIdx = Math.min(party.length-1, b.partyIdx+1);
      if (back && !b.forced){ b.phase = 'menu'; return; }
      if (confirm){
        const target = party[b.partyIdx];
        if (target.hp <= 0){ bmsg([`${monName(target)} is too faded to fight!`], () => { b.phase='party'; }); return; }
        if (b.partyIdx === b.activeIdx && !b.forced){ b.phase = 'menu'; return; }
        switchTo(b.partyIdx);
      }
      return;
    }
  }
}

function newGame(){
  state = 'world';
  showDialog(['Vienna, 1885. The city sleeps badly.',
              'You are Sigmund Freud — young, broke, magnificently bearded, and convinced that dreams mean something.',
              'Professor Brücke waits in the plaza. (Walk with arrows, talk with Z.)']);
}

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k.startsWith('arrow') || k === ' ') e.preventDefault();
  keysDown[k] = true;
  if (k==='z'||k==='enter'||k==='x') handleKey(k);
  // discrete (non-held) navigation in menus & battles
  if (state !== 'world' && KEY_DIR[k]) handleKey(k);
});
window.addEventListener('keyup', e => { keysDown[e.key.toLowerCase()] = false; });

/* ---------------- Update ---------------- */
function update(dt){
  timeMs += dt;
  if (state !== 'world') return;
  moveCooldown -= dt;
  if (moveCooldown > 0) return;
  for (const k in KEY_DIR){
    if (keysDown[k]){
      tryMove(KEY_DIR[k]);
      moveCooldown = 150;
      break;
    }
  }
}

/* ============================================================
   PIXEL-ART SPRITE ENGINE
   Sprites are built into small per-pixel buffers (procedural,
   snapped to a pixel grid) and blitted scaled with crisp edges.
   Tiles are baked once into 40x40 offscreen canvases.
   All canvas-creating work is lazy so the headless test never
   touches document.createElement.
   ============================================================ */
function shade(hex, f){
  const n = parseInt(hex.slice(1), 16);
  let r = (n>>16)&255, g = (n>>8)&255, b = n&255;
  r = Math.max(0, Math.min(255, Math.round(r*f)));
  g = Math.max(0, Math.min(255, Math.round(g*f)));
  b = Math.max(0, Math.min(255, Math.round(b*f)));
  return '#' + (0x1000000 + (r<<16) + (g<<8) + b).toString(16).slice(1);
}
function makeBuf(n){ return Array.from({length:n}, () => Array(n).fill(null)); }
function setpx(buf, x, y, c){ if (c && x>=0 && y>=0 && y<buf.length && x<buf[0].length) buf[y][x] = c; }
function outline(buf, col){
  const n = buf.length, add = [];
  for (let y=0;y<n;y++) for (let x=0;x<n;x++){
    if (buf[y][x]) continue;
    if ((y>0&&buf[y-1][x])||(y<n-1&&buf[y+1][x])||(x>0&&buf[y][x-1])||(x<n-1&&buf[y][x+1])) add.push([x,y]);
  }
  for (const [x,y] of add) buf[y][x] = col;
}
function blitBuf(buf, dx, dy, P, flip){
  const n = buf.length;
  for (let y=0;y<n;y++){
    const row = buf[y], w = row.length;
    for (let x=0;x<w;x++){
      const c = row[x]; if (!c) continue;
      const X = flip ? dx + (w-1-x)*P : dx + x*P;
      ctx.fillStyle = c; ctx.fillRect(X, dy + y*P, P, P);
    }
  }
}

/* ----- per-creature 16x16 pixel templates -----
   Each dream is a hand-drawn grid keyed to a palette derived from its
   base colour, shaped after the emoji its name plays on:
   dove, wolf-pup, hatching chick, toad, dew-drop, butterfly, bat,
   moai, snake, owl, swan, stag, octopus, night-mare, the dark moon. */
function paint(buf, rows, pal){
  for (let y=0;y<rows.length;y++){
    const r = rows[y];
    for (let x=0;x<r.length;x++){ const c = pal[r[x]]; if (c) buf[y][x] = c; }
  }
}
function basePal(base){
  return { o:shade(base,0.42), B:base, d:shade(base,0.72), l:shade(base,1.28),
           w:'#ffffff', k:'#191325', W:'#ffffff' };
}

const monBufCache = {};
function buildCreature(sp){
  const m = MONS[sp], buf = makeBuf(16);
  paint(buf, m.rows, Object.assign(basePal(m.c), m.x||{}));
  return buf;
}

function drawCreature(sp, cx, cy, P, flip){
  const buf = monBufCache[sp] || (monBufCache[sp] = buildCreature(sp));
  blitBuf(buf, Math.round(cx - 8*P), Math.round(cy - 8*P), P, !!flip);
}

/* ----- people (player + NPCs) ----- */
const personCache = {};
function buildPerson(o, dir){
  const buf = makeBuf(16), O = '#1a1320';
  const skin=o.skin, skinD=shade(o.skin,0.85);
  const hair=o.hair, hairD=shade(o.hair,0.8);
  const coat=o.coat, coatD=shade(o.coat,0.78), coatL=shade(o.coat,1.15);
  const shirt=o.shirt||'#efe7d5';
  for (let y=13;y<15;y++){ setpx(buf,6,y,'#2a2230'); setpx(buf,7,y,'#2a2230'); setpx(buf,9,y,'#2a2230'); setpx(buf,10,y,'#2a2230'); }
  setpx(buf,6,15,O); setpx(buf,7,15,O); setpx(buf,9,15,O); setpx(buf,10,15,O);
  for (let y=8;y<13;y++) for (let x=4;x<12;x++) setpx(buf,x,y,coat);
  for (let y=8;y<13;y++){ setpx(buf,11,y,coatD); setpx(buf,4,y,coatL); }
  for (let y=8;y<12;y++){ setpx(buf,3,y,coatD); setpx(buf,12,y,coatD); }
  if (dir!=='up') for (let y=8;y<12;y++){ setpx(buf,7,y,shirt); setpx(buf,8,y,shirt); }
  for (let y=3;y<8;y++) for (let x=5;x<11;x++) setpx(buf,x,y,skin);
  for (let x=5;x<11;x++) setpx(buf,x,7,skinD);
  if (o.beard){ for (let x=5;x<11;x++) setpx(buf,x,7,hairD); setpx(buf,5,6,hairD); setpx(buf,10,6,hairD);
    setpx(buf,6,8,hairD); setpx(buf,7,8,hairD); setpx(buf,8,8,hairD); setpx(buf,9,8,hairD); }
  if (dir==='up'){ for (let y=2;y<8;y++) for (let x=5;x<11;x++) setpx(buf,x,y,hair); }
  else {
    for (let x=4;x<12;x++) setpx(buf,x,2,hair);
    setpx(buf,4,3,hair); setpx(buf,5,3,hair); setpx(buf,10,3,hair); setpx(buf,11,3,hair);
    setpx(buf,4,4,hair); setpx(buf,11,4,hair);
  }
  if (o.long && dir!=='up') for (let y=3;y<9;y++){ setpx(buf,4,y,hair); setpx(buf,11,y,hair); }
  if (dir==='down'){ setpx(buf,6,5,O); setpx(buf,9,5,O); }
  else if (dir==='left') setpx(buf,6,5,O);
  if (o.hat==='top'){ for (let x=4;x<12;x++) setpx(buf,x,2,O); for (let x=5;x<11;x++){ setpx(buf,x,0,O); setpx(buf,x,1,O); } }
  if (o.hat==='helm'){ for (let x=4;x<12;x++) setpx(buf,x,2,'#9aa0ad'); for (let x=5;x<11;x++) setpx(buf,x,1,'#b6bcc8');
    setpx(buf,8,0,'#c0392b'); setpx(buf,7,1,'#9aa0ad'); }
  outline(buf, O);
  return buf;
}

/* ----- baked tile canvases ----- */
let TC = null;
function buildTiles(){
  TC = {};
  const tcv = () => { const cn = document.createElement('canvas'); cn.width = 40; cn.height = 40; return cn; };
  const mk = (fn) => { const cn = tcv(); fn(cn.getContext('2d')); return cn; };
  const P = (x,gx,gy,gw,gh,c) => { x.fillStyle = c; x.fillRect(gx*2, gy*2, gw*2, gh*2); };
  const speck = (x,seed,col,n) => { let s=seed; const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
    for (let i=0;i<n;i++) P(x, Math.floor(rnd()*20), Math.floor(rnd()*20), 1, 1, col); };

  TC.grass = mk(x => { P(x,0,0,20,20,'#5fa64f'); speck(x,7,'#6fb85c',26); speck(x,99,'#4f9142',22);
    P(x,3,5,1,2,'#3f7d38'); P(x,12,9,1,2,'#3f7d38'); P(x,8,15,1,2,'#3f7d38'); P(x,16,3,1,2,'#3f7d38'); });
  TC.path = mk(x => { P(x,0,0,20,20,'#cdb279'); speck(x,5,'#d8c08c',20); speck(x,33,'#b89a63',18);
    P(x,0,0,20,1,'#b89a63'); P(x,0,19,20,1,'#b89a63'); });
  TC.depth = mk(x => { P(x,0,0,20,20,'#2c2547'); speck(x,11,'#3a3158',24); speck(x,71,'#241d3c',18);
    P(x,4,4,1,1,'#a99fd0'); P(x,14,7,1,1,'#cfc4e8'); P(x,9,13,1,1,'#8a7fc0'); P(x,17,15,1,1,'#a99fd0'); });
  TC.water = mk(x => { P(x,0,0,20,20,'#3f7fc0'); speck(x,17,'#4f8fd0',16);
    P(x,2,6,7,1,'#7fb0e0'); P(x,11,12,6,1,'#7fb0e0'); P(x,4,16,6,1,'#5f9fd8'); });
  TC.wall = mk(x => { P(x,0,0,20,20,'#9a6b50');
    for (let r=0;r<5;r++) P(x,0,r*4+3,20,1,'#7a5238');
    for (let r=0;r<5;r++){ const off=r%2?3:0; for (let cx=off;cx<20;cx+=6) P(x,cx,r*4,1,4,'#7a5238'); }
    P(x,12,4,5,5,'#bfe0e8'); P(x,12,4,5,1,'#7a5238'); P(x,14,4,1,5,'#7a5238'); });
  TC.door = mk(x => { P(x,0,0,20,20,'#9a6b50'); for (let r=0;r<5;r++) P(x,0,r*4+3,20,1,'#7a5238');
    P(x,5,3,10,17,'#5d3b1e'); P(x,6,4,8,15,'#6e4a28'); P(x,6,4,8,4,'#d8c08c'); P(x,12,12,1,1,'#e8c84a'); });
  TC.tree = mk(x => { P(x,9,12,2,5,'#6d4a2a'); P(x,8,16,4,1,'#5a3a20');
    const f=(cx,cy,r,c)=>{ for (let yy=-r;yy<=r;yy++) for (let xx=-r;xx<=r;xx++) if (xx*xx+yy*yy<=r*r) P(x,cx+xx,cy+yy,1,1,c); };
    f(10,7,6,'#2f6b33'); f(7,6,4,'#347a3a'); f(12,5,3,'#3c8a42'); f(10,7,2,'#48a050'); });
  TC.fence = mk(x => { P(x,2,5,2,12,'#8a6a40'); P(x,16,5,2,12,'#8a6a40'); P(x,0,7,20,2,'#9a7a4c'); P(x,0,12,20,2,'#9a7a4c');
    P(x,2,5,2,1,'#b89a64'); P(x,16,5,2,1,'#b89a64'); });
  TC.gate = mk(x => { P(x,1,2,3,16,'#5a606c'); P(x,16,2,3,16,'#5a606c');
    for (let cx=5;cx<16;cx+=4) P(x,cx,4,1,12,'#6a7080'); P(x,4,4,12,1,'#6a7080'); P(x,4,14,12,1,'#6a7080');
    P(x,1,2,3,1,'#8a909c'); P(x,16,2,3,1,'#8a909c'); });
}

/* ----- animated tile overlays ----- */
function waveOverlay(sx, sy, wx, wy){
  const ph = Math.round(Math.sin(timeMs/500 + wx + wy) * 2) * 2;
  ctx.fillStyle = 'rgba(255,255,255,.45)';
  ctx.fillRect(sx+8, sy+18+ph, 10, 2); ctx.fillRect(sx+22, sy+26-ph, 8, 2);
}
function mistOverlay(sx, sy, wx, wy, c){
  const t = timeMs/700 + wx*1.3 + wy*0.7;
  const a = 0.26 + Math.sin(t)*0.12;
  ctx.fillStyle = c==='m' ? `rgba(196,170,240,${a})` : `rgba(150,110,225,${a+0.12})`;
  const off = Math.round(Math.sin(t)*2) * 2;
  ctx.fillRect(sx+6,  sy+10+off, 8, 6);
  ctx.fillRect(sx+20, sy+18-off, 10, 6);
  ctx.fillRect(sx+12, sy+24+off, 8, 5);
}
function altarOverlay(sx, sy){
  const g = 0.5 + Math.sin(timeMs/400)*0.35;
  ctx.fillStyle = '#6a5a86'; ctx.fillRect(sx+12, sy+16, 16, 18);
  ctx.fillStyle = '#4a3d63'; ctx.fillRect(sx+14, sy+18, 12, 14);
  ctx.fillStyle = `rgba(245,232,150,${g})`;
  ctx.fillRect(sx+12, sy+4, 16, 4); ctx.fillRect(sx+18, sy+8, 4, 24);
}
function platform(cx, cy, rw){
  ctx.fillStyle = 'rgba(20,12,40,.35)';
  ctx.beginPath(); ctx.ellipse(cx, cy, rw, rw*0.32, 0, 0, 7); ctx.fill();
}
function drawCouch(cx, cy, s){
  const P = (gx,gy,gw,gh,c) => { ctx.fillStyle = c; ctx.fillRect(cx+gx*s, cy+gy*s, gw*s, gh*s); };
  P(-8,-2,16,6,'#7a3b4a'); P(-8,-5,3,5,'#8a4a59'); P(5,-5,3,5,'#8a4a59');
  P(-5,-5,10,3,'#9a5566'); P(-5,-1,10,2,'#5a2a36'); P(-8,4,2,3,'#3a2028'); P(6,4,2,3,'#3a2028');
}

/* ---------------- Rendering ---------------- */
function drawHpBar(x, y, w, mon){
  const frac = mon.hp / mon.stats.maxhp;
  ctx.fillStyle = '#222';
  ctx.fillRect(x, y, w, 8);
  ctx.fillStyle = frac > 0.5 ? '#48b04f' : frac > 0.25 ? '#d8a832' : '#d04545';
  ctx.fillRect(x+1, y+1, Math.max(0, Math.round((w-2)*frac)), 6);
}
function wrapText(text, x, y, maxW, lh){
  const words = String(text).split(' ');
  let line = '', yy = y;
  for (const w of words){
    const t = line ? line + ' ' + w : w;
    if (ctx.measureText(t).width > maxW && line){
      ctx.fillText(line, x, yy); line = w; yy += lh;
    } else line = t;
  }
  if (line) ctx.fillText(line, x, yy);
  return yy;
}
function panel(x, y, w, h, fill='#f6f1e1', border='#3a2d20'){
  ctx.fillStyle = border;            ctx.fillRect(x-3, y-3, w+6, h+6);
  ctx.fillStyle = shade(border,1.7); ctx.fillRect(x-1, y-1, w+2, h+2);
  ctx.fillStyle = fill;              ctx.fillRect(x, y, w, h);
  ctx.fillStyle = shade(fill,1.08);  ctx.fillRect(x+2, y+2, w-4, 2);
}

function drawTile(c, sx, sy, wx, wy){
  if (!TC) buildTiles();
  // pick the baked ground beneath this tile
  let ground = 'grass';
  if (c==='.') ground = 'path';
  else if (c==='D' || c==='M' || c==='a') ground = 'depth';
  else if (c==='b') ground = 'wall';
  else if (c==='d') ground = 'door';
  else if (c==='w') ground = 'water';
  else if (c==='G') ground = (wy<=8) ? 'depth' : 'path';
  ctx.drawImage(TC[ground], sx, sy);
  // decorations & animated overlays
  if (c==='t') ctx.drawImage(TC.tree, sx, sy);
  else if (c==='f') ctx.drawImage(TC.fence, sx, sy);
  else if (c==='G') ctx.drawImage(TC.gate, sx, sy);
  else if (c==='w') waveOverlay(sx, sy, wx, wy);
  else if (c==='m' || c==='M') mistOverlay(sx, sy, wx, wy, c);
  else if (c==='a') altarOverlay(sx, sy);
}

  ctx.fillText('Das Unbewusste was not destroyed — it was understood.', W/2, 215);
  ctx.fillText('And what is understood need no longer be feared.', W/2, 242);
  ctx.fillText('Years pass. The dream journal grows into a manuscript...', W/2, 290);
  ctx.font = 'italic bold 22px Georgia';
  ctx.fillText('1899 — "The Interpretation of Dreams" is published.', W/2, 335);
  ctx.font = 'bold 26px Georgia'; ctx.fillStyle = '#7a1f1f';
  ctx.fillText('Psychoanalysis is born.', W/2, 380);
  ctx.fillStyle = '#4a2e16'; ctx.font = '15px Georgia';
  ctx.fillText('THE END — press Enter to keep wandering your dreams', W/2, 435);
  ctx.textAlign='left';
}

function draw(){
  ctx.clearRect(0,0,W,H);
  if (state === 'title') return drawTitle();
  if (state === 'ending') return drawEnding();
  if (state === 'battle') return drawBattle();
  if (state === 'starter') return drawStarter();
  if (state === 'menu') return drawMenu();
  drawWorld();
  if (state === 'dialog') drawDialog();
}

/* ---------------- Main loop ---------------- */
function loop(t){
  const dt = Math.min(50, t - lastT);
  lastT = t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

genMap();
requestAnimationFrame(loop);
</script>
